version: "3.8"

services:

  web:
    image: kanomble/rec_blast_base_image:3.0
    cpus: "${WEB_CPUS:-2.0}"
    mem_limit: "${WEB_MEM_LIMIT:-8g}"
    pids_limit: "${WEB_PIDS_LIMIT:-512}"

    command:  sh -c "wait-for rabbitmq:5672 && wait-for postgres:5432
     && python manage.py makemigrations && python manage.py migrate
     && python manage.py runscript startup
     && gunicorn celery_blast.wsgi:application --bind 0.0.0.0:8000 --timeout 10000 --workers 4 --threads 2"
    container_name: cathi_web
    networks:
      - app
      - data
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      CATHI_ENV: production
      PROTECTED_MEDIA_USE_X_ACCEL: "true"
      PROTECTED_MEDIA_ROOT: /blast/reciprocal_blast/media
      PROTECTED_MEDIA_INTERNAL_URL: /_protected_media/
    depends_on:
      - rabbitmq
      - postgres
    volumes:
      - ./data:/blast/reciprocal_blast/media
      - ./tmp:/blast/reciprocal_blast/tmp
      - ./celery_blast:/blast/reciprocal_blast
    expose:
      - 8000

  celery_worker:
    image: kanomble/rec_blast_base_image:3.0
    command: sh -c "wait-for rabbitmq:5672 && wait-for web:8000 -- celery -A celery_blast worker -l INFO -Q $${CELERY_WORKFLOW_QUEUE:-long_bio} --concurrency=$${CELERY_WORKFLOW_WORKER_CONCURRENCY:-1} --prefetch-multiplier=$${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}"
    env_file:
      - ./.env.prod
    environment:
      CATHI_ENV: production
    depends_on:
      - web
      - postgres
      - rabbitmq
      - nginx
    networks:
      - app
      - data
    volumes:
      - ./data:/blast/reciprocal_blast/media
      - ./tmp:/blast/reciprocal_blast/tmp
      - ./celery_blast:/blast/reciprocal_blast
    cpus: "${CELERY_WORKFLOW_CPUS:-1.0}"
    mem_limit: "${CELERY_WORKFLOW_MEM_LIMIT:-4g}"
    pids_limit: "${CELERY_WORKFLOW_PIDS_LIMIT:-256}"
    restart: unless-stopped

  celery_worker_interactive:
    image: kanomble/rec_blast_base_image:3.0
    command: sh -c "wait-for rabbitmq:5672 && wait-for web:8000 -- celery -A celery_blast worker -l INFO -Q $${CELERY_INTERACTIVE_QUEUE:-interactive} --concurrency=$${CELERY_INTERACTIVE_WORKER_CONCURRENCY:-2} --prefetch-multiplier=1"
    env_file:
      - ./.env.prod
    environment:
      CATHI_ENV: production
    depends_on:
      - web
      - postgres
      - rabbitmq
    networks:
      - app
      - data
    volumes:
      - ./data:/blast/reciprocal_blast/media
      - ./tmp:/blast/reciprocal_blast/tmp
      - ./celery_blast:/blast/reciprocal_blast
    cpus: "${CELERY_INTERACTIVE_CPUS:-1.0}"
    mem_limit: "${CELERY_INTERACTIVE_MEM_LIMIT:-2g}"
    pids_limit: "${CELERY_INTERACTIVE_PIDS_LIMIT:-128}"
    restart: unless-stopped

  celery_worker_maintenance:
    image: kanomble/rec_blast_base_image:3.0
    command: sh -c "wait-for rabbitmq:5672 && wait-for web:8000 -- celery -A celery_blast worker -l INFO -Q $${CELERY_MAINTENANCE_QUEUE:-maintenance} --concurrency=$${CELERY_MAINTENANCE_WORKER_CONCURRENCY:-1} --prefetch-multiplier=$${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}"
    env_file:
      - ./.env.prod
    environment:
      CATHI_ENV: production
    depends_on:
      - web
      - postgres
      - rabbitmq
    networks:
      - app
      - data
    volumes:
      - ./data:/blast/reciprocal_blast/media
      - ./tmp:/blast/reciprocal_blast/tmp
      - ./celery_blast:/blast/reciprocal_blast
    cpus: "${CELERY_MAINTENANCE_CPUS:-1.0}"
    mem_limit: "${CELERY_MAINTENANCE_MEM_LIMIT:-2g}"
    pids_limit: "${CELERY_MAINTENANCE_PIDS_LIMIT:-128}"
    restart: unless-stopped

  jupyter_notebook:
    image: kanomble/rec_blast_base_image:3.0
    profiles:
      - admin
    command: >
      sh -c 'test -n "$$JUPYTER_TOKEN" || { echo "JUPYTER_TOKEN is required"; exit 1; };
      cd media/ && jupyter notebook --port=8888 --no-browser --ip=0.0.0.0 --NotebookApp.token="$$JUPYTER_TOKEN"'
    networks:
      - app
      - data
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      CATHI_ENV: production
    depends_on:
      - rabbitmq
      - postgres
    volumes:
      - ./data:/blast/reciprocal_blast/media
    ports:
      - "127.0.0.1:8888:8888"
    cpus: "${JUPYTER_CPUS:-1.0}"
    mem_limit: "${JUPYTER_MEM_LIMIT:-2g}"
    pids_limit: "${JUPYTER_PIDS_LIMIT:-128}"

  flower:
    image: kanomble/rec_blast_base_image:3.0
    profiles:
      - admin
    command: >
      sh -c 'test -n "$$FLOWER_BASIC_AUTH" || { echo "FLOWER_BASIC_AUTH is required"; exit 1; };
      wait-for rabbitmq:5672 && wait-for web:8000 -- celery -A celery_blast flower --port=5555 --basic_auth="$$FLOWER_BASIC_AUTH"'
    networks:
      - app
      - data
    env_file:
      - ./.env.prod
    environment:
      CATHI_ENV: production
    depends_on:
      - web
      - postgres
      - rabbitmq
      - celery_worker
      - celery_worker_interactive
      - celery_worker_maintenance
    volumes:
        - ./celery_blast:/blast/reciprocal_blast
    ports:
      - "127.0.0.1:5555:5555"
    cpus: "${FLOWER_CPUS:-0.5}"
    mem_limit: "${FLOWER_MEM_LIMIT:-512m}"
    pids_limit: "${FLOWER_PIDS_LIMIT:-128}"
    restart: unless-stopped

  nginx:
    build:
      context: ./
      dockerfile: ./nginx/Dockerfile
    volumes:
      - ./celery_blast/static:/blast/reciprocal_blast/assets
      - ./data:/blast/reciprocal_blast/media
    ports:
      - 1337:8080
    depends_on:
      - web
    networks:
      - edge
      - app
    cpus: "${NGINX_CPUS:-1.0}"
    mem_limit: "${NGINX_MEM_LIMIT:-512m}"
    pids_limit: "${NGINX_PIDS_LIMIT:-128}"

  rabbitmq:
    hostname: rabbitmq
    image: kanomble/rec_blast_rabbitmq_image:1.1
    env_file:
      - ./.env.prod
    command: >
      sh -c ': "$${RABBITMQ_CONSUMER_TIMEOUT_MS:=346000000}";
      case "$$RABBITMQ_CONSUMER_TIMEOUT_MS" in *[!0-9]*|"") echo "RABBITMQ_CONSUMER_TIMEOUT_MS must be an integer millisecond value"; exit 1;; esac;
      sed "s/{{RABBITMQ_CONSUMER_TIMEOUT_MS}}/$$RABBITMQ_CONSUMER_TIMEOUT_MS/g" /etc/rabbitmq/rabbitmq.conf.template > /tmp/rabbitmq.conf;
      export RABBITMQ_CONFIG_FILE=/tmp/rabbitmq;
      exec rabbitmq-server'
    networks:
      - data
    volumes:
      - ./rabbitmq/rabbitmq.conf.template:/etc/rabbitmq/rabbitmq.conf.template:ro
    cpus: "${RABBITMQ_CPUS:-1.0}"
    mem_limit: "${RABBITMQ_MEM_LIMIT:-1g}"
    pids_limit: "${RABBITMQ_PIDS_LIMIT:-256}"
    restart: on-failure

  postgres:
    hostname: postgres
    image: kanomble/rec_blast_postgres_db_image:1.0
    env_file:
      - ./.env.prod.db
    networks:
      - data
    restart: on-failure
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    cpus: "${POSTGRES_CPUS:-1.0}"
    mem_limit: "${POSTGRES_MEM_LIMIT:-2g}"
    pids_limit: "${POSTGRES_PIDS_LIMIT:-256}"
networks:
  edge:
  app:
  data:
    internal: true
