version: "3.8"

services:

  web:
    image: kanomble/rec_blast_base_image:3.0
    deploy:
      resources:
        limits:
          memory: 8G

    command:  sh -c "wait-for rabbitmq:5672 && wait-for postgres:5432
     && python manage.py makemigrations && python manage.py migrate
     && python manage.py runscript startup
     && gunicorn celery_blast.wsgi:application --bind 0.0.0.0:8000 --timeout 10000 --workers 4 --threads 2"
    container_name: cathi_web
    networks:
      - app
      - data
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      CATHI_ENV: production
      PROTECTED_MEDIA_USE_X_ACCEL: "true"
      PROTECTED_MEDIA_ROOT: /blast/reciprocal_blast/media
      PROTECTED_MEDIA_INTERNAL_URL: /_protected_media/
    depends_on:
      - rabbitmq
      - postgres
    volumes:
      - ./data:/blast/reciprocal_blast/media
      - ./tmp:/blast/reciprocal_blast/tmp
      - ./celery_blast:/blast/reciprocal_blast
    expose:
      - 8000

  celery_worker:
    image: kanomble/rec_blast_base_image:3.0
    command: sh -c "wait-for rabbitmq:5672 && wait-for web:8000 -- celery -A celery_blast worker -l INFO"
    env_file:
      - ./.env.prod
    environment:
      CATHI_ENV: production
    depends_on:
      - web
      - postgres
      - rabbitmq
      - nginx
    networks:
      - app
      - data
    volumes:
      - ./data:/blast/reciprocal_blast/media
      - ./tmp:/blast/reciprocal_blast/tmp
      - ./celery_blast:/blast/reciprocal_blast
    restart: unless-stopped

  jupyter_notebook:
    image: kanomble/rec_blast_base_image:3.0
    profiles:
      - admin
    command: >
      sh -c 'test -n "$$JUPYTER_TOKEN" || { echo "JUPYTER_TOKEN is required"; exit 1; };
      cd media/ && jupyter notebook --port=8888 --no-browser --ip=0.0.0.0 --allow-root --NotebookApp.token="$$JUPYTER_TOKEN"'
    networks:
      - app
      - data
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      CATHI_ENV: production
    depends_on:
      - rabbitmq
      - postgres
    volumes:
      - ./data:/blast/reciprocal_blast/media
    ports:
      - "127.0.0.1:8888:8888"

  flower:
    image: kanomble/rec_blast_base_image:3.0
    profiles:
      - admin
    command: >
      sh -c 'test -n "$$FLOWER_BASIC_AUTH" || { echo "FLOWER_BASIC_AUTH is required"; exit 1; };
      wait-for rabbitmq:5672 && wait-for web:8000 -- celery -A celery_blast flower --port=5555 --basic_auth="$$FLOWER_BASIC_AUTH"'
    networks:
      - app
      - data
    env_file:
      - ./.env.prod
    environment:
      CATHI_ENV: production
    depends_on:
      - web
      - postgres
      - rabbitmq
      - celery_worker
    volumes:
        - ./celery_blast:/blast/reciprocal_blast
    ports:
      - "127.0.0.1:5555:5555"
    restart: unless-stopped

  nginx:
    build:
      context: ./
      dockerfile: ./nginx/Dockerfile
    volumes:
      - ./celery_blast/static:/blast/reciprocal_blast/assets
      - ./data:/blast/reciprocal_blast/media
    ports:
      - 1337:80
    depends_on:
      - web
    networks:
      - edge
      - app

  rabbitmq:
    hostname: rabbitmq
    image: kanomble/rec_blast_rabbitmq_image:1.1
    networks:
      - data
    restart: on-failure

  postgres:
    hostname: postgres
    image: kanomble/rec_blast_postgres_db_image:1.0
    env_file:
      - ./.env.prod.db
    networks:
      - data
    restart: on-failure
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
networks:
  edge:
  app:
  data:
    internal: true
